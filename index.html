<!DOCTYPE html><html>
<head>
    <title>Health Dashboard (Firebase Connected)</title><!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
}

h1 {
    text-align: center;
    padding: 20px;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.bed {
    background: white;
    width: 280px;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.status {
    padding: 6px 15px;
    border-radius: 20px;
    color: white;
    display: inline-block;
}

.normal { background: #2ecc71; }
.warning { background: #e74c3c; }

.value { font-size: 18px; font-weight: bold; }
</style></head><body>
<h1>REAL-TIME HEALTH DASHBOARD</h1><div class="container"><div class="bed">
    <h2>Bed 1</h2>
    <div id="status1" class="status normal">Normal</div>
    <p>Heart: <span id="heart1">--</span></p>
    <p>SpO₂: <span id="spo21">--</span></p>
    <p>Temp: <span id="temp1">--</span></p>
</div><div class="bed">
    <h2>Bed 2</h2>
    <div id="status2" class="status normal">Normal</div>
    <p>Heart: <span id="heart2">--</span></p>
    <p>SpO₂: <span id="spo22">--</span></p>
    <p>Temp: <span id="temp2">--</span></p>
</div><div class="bed">
    <h2>Bed 3</h2>
    <div id="status3" class="status normal">Normal</div>
    <p>Heart: <span id="heart3">--</span></p>
    <p>SpO₂: <span id="spo23">--</span></p>
    <p>Temp: <span id="temp3">--</span></p>
</div></div><script>
// 🔹 Replace with your Firebase config
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function updateBed(bedId) {
    db.ref("beds/bed" + bedId).on("value", (snapshot) => {
        const data = snapshot.val();

        document.getElementById("heart" + bedId).innerText = data.heart + " bpm";
        document.getElementById("spo2" + bedId).innerText = data.spo2 + "%";
        document.getElementById("temp" + bedId).innerText = data.temp + " °C";

        let status = "Normal";
        let className = "normal";

        if (data.heart > 100 || data.spo2 < 95 || data.temp > 37.5) {
            status = "Critical";
            className = "warning";
        }

        let statusEl = document.getElementById("status" + bedId);
        statusEl.innerText = status;
        statusEl.className = "status " + className;
    });
}

// Listen for all beds
updateBed(1);
updateBed(2);
updateBed(3);
</script></body>
</html>
